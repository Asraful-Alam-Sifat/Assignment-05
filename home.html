<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>

        <!-- Tailwind & DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
        font-family: "Geist", sans-serif;
       box-sizing: border-box;
    }
        :root{
            --primary-text-color: #1f2937;
            --sub-text-color: #64748b;

            --issue-color: #a855f7FF;
        }
    </style>
</head>
<body class=" bg-base-200">
    <!-- header -->
     <header>
          <div class="navbar bg-base-100 shadow-sm px-18 py-5">
  <div class="flex-1 flex ">
    <img class="w-10 h-10" src="assets/github-logo.png" alt="">
    <a class="btn btn-ghost text-2xl font-semibold text-(--primary-text-color)">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2 ">
    <div class=" relative inline-block">
        <i class="fa-solid fa-magnifying-glass absolute z-10 text-gray-500 top-3 left-4 "></i>
        <input id="search" type="text" placeholder="Search" class="input input-bordered w-56 md:w-auto pl-9.5 font-semibold text-lg text-gray " />
    </div>
  
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-primary">
        <button><i class="fa-solid fa-plus"></i> New Issue</button>
      </div>
  
    </div>
  </div>
</div>
     </header>

     <!-- main -->
    <main class="mt-16">
        
        <section class="menu-container bg-base-100 container mx-auto p-4 rounded-xl shadow-sm">
             <div class=" menu  flex flex-row gap-5">
         <button  class="menu-active p-1 px-10 bg-primary rounded-md"><a>Item 1</a></button>
         <button class="p-1 px-10 rounded-md border-2 border-gray-300"><a class="">Item 2</a></button>
         <button class="p-1 px-10 rounded-md border-2 border-gray-300"><a>Item 3</a></button> 
        </div>
        </section>

        <section class="issue-status mt-5 container bg-base-100 mx-auto p-4 rounded-xl shadow-sm flex justify-between items-center">
            <div class="flex gap-2 items-center">
                   <img class="bg-purple-200 p-1 rounded-full w-10 h-10"  src="assets/Aperture.png" alt="">
                <div>
                    <h3 class="font-semibold text-xl text-(--primary-text-color) "> <span id="issues-count">0</span> Issues</h3>
                    <p class="font-normal text-base text-(--sub-text-color)">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-3">
                <div class="flex items-center gap-1">
                    <span class=" bg-green-700 w-3 h-3 rounded-full"></span>
                    <h4 class="font-medium text-base text-(--primary-text-color)">Open</h4>
                </div>
                <div class="flex gap-1 items-center">
                    <span class="bg-(--issue-color) w-3 h-3 rounded-full "></span>
                    <h4 class="font-medium text-base text-(--primary-text-color)">Closed</h4>
                </div>
            </div>
        </section>
       
    
    </main>
  


</body>
</html>
