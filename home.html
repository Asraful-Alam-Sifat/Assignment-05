<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>

        <!-- Tailwind & DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
        font-family: "Geist", sans-serif;
       box-sizing: border-box;
    }
        :root{
            --primary-text-color: #1f2937;
            --sub-text-color: #64748b;
        }
    </style>
</head>
<body class=" bg-base-200">
    <!-- header -->
     <header>
          <div class="navbar bg-base-100 shadow-sm px-18 py-5">
  <div class="flex-1 flex ">
    <img class="w-10 h-10" src="assets/github-logo.png" alt="">
    <a class="btn btn-ghost text-2xl font-semibold">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2 ">
    <div class=" relative inline-block">
        <i class="fa-solid fa-magnifying-glass absolute z-10 text-gray-500 top-3 left-4 "></i>
        <input id="search" type="text" placeholder="Search" class="input input-bordered w-56 md:w-auto pl-9.5 font-semibold text-lg text-gray " />
    </div>
  
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-primary">
        <button><i class="fa-solid fa-plus"></i> New Issue</button>
      </div>
  
    </div>
  </div>
</div>
     </header>

     <!-- main -->

  


</body>
</html>
