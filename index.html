<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Tailwind & DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
        font-family: "Geist", sans-serif;
       box-sizing: border-box;
    }
        :root{
            --primary-text-color: #1f2937;
            --sub-text-color: #64748b;
        }
    </style>

</head>
<body class=" bg-base-200 py-24">
    <section class="max-w-xl mx-auto bg-base-100 p-8 rounded-2xl">

<!-- Header -->
        <header class="flex flex-col justify-center items-center gap-y-5 mb-8">
        <img class="w-24 h-24"  src="assets/github-logo.png" alt="Github-logo">

        <div>
            <h1 class="text-(--primary-text-color) text-2xl font-semibold text-center mb-1">GitHub Issues Tracker</h1>
        <h5 class="text-center font-normal text-base text-(--sub-text-color)">Sign in to manage your issues</h5>
        </div>
        
    </header> 

<!-- Main -->
    <main>
         <fieldset class="fieldset">
          <label class="label font-medium text-base text-(--primary-text-color)">Username</label>
          <input type="email" id="username" class="input w-full mb-6" placeholder="Enter Username" />

          <label class="label font-medium text-base text-(--primary-text-color)">Password</label>
          <input type="password" id="password" class="input w-full mb-6" placeholder="Enter Password" />

          <button onclick="signIn()" class="btn btn-neutral mt-4 bg-primary border-none">Sign In</button>
        </fieldset>
    </main>

    <div class="flex items-center my-6">
       <div class="flex-grow border-t border-gray-300"></div>
       <span class="flex-shrink mx-3 text-(--primay-text-color) text-base">OR</span>
       <div class="flex-grow border-t border-gray-300"></div>
    </div>

 <!-- Footer -->
    <footer>
        <p class="text-(--sub-text-color) font-normal text-sm text-center mb-4">Demo Credentials:</p>

        <div class="bg-base-200 rounded-md px-36 py-8">
            <p class="font-bold text-base ">Username: <span class="font-medium text-(--sub-text-color)">admin</span></p>
            <p class="font-bold text-base">Password: <span class="font-medium text-(--sub-text-color)">admin123</span></p>
        </div>
    </footer>

    </section>
   
  
 <!-- script Files -->
     <script src="script/login.js"></script>
</body>
</html>
